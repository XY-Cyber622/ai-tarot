name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 允许 workflow 写 Pages 部署
permissions:
  contents: read
  pages: write
  id-token: write

# 同一部署并发 1 个，避免抢占
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check + Build
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_API_MODEL: ${{ secrets.VITE_API_MODEL }}
        run: npm run build

      # GitHub Pages 对未知路径直接返回 404，但 SPA 需要回退到 index.html。
      # 把 index.html 复制成 404.html 即可让 React Router 接管路由。
      - name: Copy index.html to 404.html (SPA fallback)
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
